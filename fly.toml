# fly.toml app configuration file generated for polymarket-trader-bitter-lake-7632 on 2026-02-01T17:34:10Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'polymarket-trader-bitter-lake-7632'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '8000'

[processes]
  app = '/app/scripts/start_all.sh'

[[mounts]]
  source = 'polymarket_data'
  destination = '/app/data'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

[checks]
  [checks.health]
    port = 8000
    type = 'http'
    interval = '30s'
    timeout = '10s'
    grace_period = '1m0s'
    method = 'GET'
    path = '/api/health'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
