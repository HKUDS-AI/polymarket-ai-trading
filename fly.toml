# Fly.io Configuration for Polymarket Trading System
# Deploy to Amsterdam (Netherlands) to avoid Polymarket geo-restrictions

app = "polymarket-trader"
primary_region = "ams"  # Amsterdam - NOT on Polymarket's blocked list

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false  # Keep running 24/7 for trading
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "polymarket_data"
  destination = "/app/data"

[checks]
  [checks.health]
    grace_period = "60s"
    interval = "30s"
    method = "GET"
    path = "/api/health"
    port = 8000
    timeout = "10s"
    type = "http"

[processes]
  app = "/app/scripts/start_all.sh"
