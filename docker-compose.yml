services:
  app:
    build: .
    container_name: polymarket-trading
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - PORT=8000
    command: ["node", "scripts/start-all.mjs"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 50s

networks:
  default:
    name: polymarket-network
