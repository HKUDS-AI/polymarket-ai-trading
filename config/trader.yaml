# Mean Reversion Trader Configuration
# Uses Kelly criterion for sizing, AI gate for filtering

data:
  db_path: data/trades_trader.db
  logs_dir: logs

execution:
  check_interval_seconds: 900  # 15 minutes
  market_fetch_limit: 1500     # Fetch more active markets for better position discovery
  sync_every_cycles: 1         # Live mode: run on-chain balance reconciliation each cycle
  sync_min_shares: 0.5         # Ignore dust positions below this share count
  sync_batch_size: 150         # ERC-1155 balanceOfBatch chunk size

risk:
  bankroll: 500               # Starting bankroll ($500)
  kelly_fraction: 0.20        # Use 20% of full Kelly (conservative)
  max_position_usd: 50        # Max $50 per trade (10% of bankroll)
  max_positions: 40           # Max 40 concurrent positions
  max_total_exposure_usd: 500 # Max $500 total at risk (full bankroll)

signals:
  mean_reversion:
    enabled: true
    favorite_threshold: 0.75   # Trade when YES > 75% (buy NO)
    longshot_min: 0.05         # Longshot floor - don't buy below 5%
    longshot_max: 0.20         # Longshot ceiling - buy YES when 5-20%
    min_mispricing_pct: 5.0    # Minimum 5% edge (research-based)

trading:
  mode: live
  model_name: trader
