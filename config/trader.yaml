# Mean Reversion Trader Configuration
# Uses Kelly criterion for sizing, AI gate for filtering

data:
  db_path: data/trades_trader.db
  logs_dir: logs

execution:
  check_interval_seconds: 300  # 5 minutes

risk:
  bankroll: 500               # Starting bankroll ($500)
  kelly_fraction: 0.20        # Use 20% of full Kelly (conservative)
  max_position_usd: 50        # Max $50 per trade (10% of bankroll)
  max_positions: 10           # Max 10 concurrent positions
  max_total_exposure_usd: 400 # Max $400 total at risk (80% of bankroll)

signals:
  mean_reversion:
    enabled: true
    favorite_threshold: 0.75   # Trade when YES > 75% (buy NO)
    longshot_threshold: 0.25   # Trade when YES < 25% (buy YES)
    min_mispricing_pct: 10.0   # Minimum 10% edge to fair value

trading:
  mode: live
  model_name: trader
